<svg viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pupil glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Scanning tail gradient -->
    <linearGradient id="scan-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4f8" />
      <stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>
    <!-- Subtle outer glow for the whole mark -->
    <filter id="mark-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ Q MARK ═══ -->
  <g transform="translate(10, 5)">
    <!-- Q circle -->
    <circle cx="65" cy="60" r="48" fill="none" stroke="#f0f4f8" stroke-width="4" />

    <!-- Q tail / scanning line -->
    <line x1="99" y1="94" x2="128" y2="123" stroke="url(#scan-grad)" stroke-width="4" stroke-linecap="round" />

    <!-- Scanning dot at tail end -->
    <circle cx="128" cy="123" r="3" fill="#00d4ff" opacity="0.8" />

    <!-- Eye — upper lid -->
    <path d="M 30,60 C 40,36 90,36 100,60" fill="none" stroke="#f0f4f8" stroke-width="2.5" stroke-linecap="round" />

    <!-- Eye — lower lid -->
    <path d="M 30,60 C 40,84 90,84 100,60" fill="none" stroke="#f0f4f8" stroke-width="2.5" stroke-linecap="round" />

    <!-- Iris ring -->
    <circle cx="65" cy="60" r="14" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" />

    <!-- Pupil -->
    <circle cx="65" cy="60" r="8" fill="#00d4ff" filter="url(#glow)" />

    <!-- Pupil highlight -->
    <circle cx="62" cy="57" r="2.5" fill="#ffffff" opacity="0.7" />
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <text x="160" y="82" font-family="'Space Grotesk', 'Heebo', sans-serif" font-size="42" font-weight="600" fill="#f0f4f8" letter-spacing="-0.5">
    Quiet<tspan fill="#00d4ff">eyes</tspan>
  </text>
</svg>
