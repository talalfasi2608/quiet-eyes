databases:
  - name: quieteyes-db
    plan: starter
    databaseName: quieteyes
    user: quieteyes
    ipAllowList: []  # only internal access

services:
  # ── API (FastAPI) ──
  - type: web
    name: quieteyes-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quieteyes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quieteyes-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: MIN_PASSWORD_LENGTH
        value: "8"
      - key: CORS_ORIGINS
        sync: false  # set manually after web deploys
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: RATE_LIMIT_AUTH
        value: "10/minute"
      - key: RATE_LIMIT_DEFAULT
        value: "60/minute"

  # ── Celery Worker ──
  - type: worker
    name: quieteyes-celery-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    dockerCommand: celery -A app.celery_app:celery worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quieteyes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quieteyes-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: TAVILY_API_KEY
        sync: false

  # ── Celery Beat (scheduler) ──
  - type: worker
    name: quieteyes-celery-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    dockerCommand: celery -A app.celery_app:celery beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quieteyes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quieteyes-redis
          type: redis
          property: connectionString

  # ── Web (Next.js) ──
  - type: web
    name: quieteyes-web
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false  # set to quieteyes-api URL after deploy

  # ── Redis ──
  - type: redis
    name: quieteyes-redis
    plan: starter
    ipAllowList: []  # only internal access
    maxmemoryPolicy: allkeys-lru
